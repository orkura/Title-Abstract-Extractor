<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Title Abstract Extractor</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div>
          <p class="eyebrow">Literature Extractor</p>
          <h1>标题和摘要</h1>
        </div>
        <div class="header-tools">
          <button id="refresh" class="icon-button" type="button" title="重新提取" aria-label="重新提取">↻</button>
          <button id="settingsButton" class="icon-button" type="button" title="系统设置" aria-label="系统设置">⚙</button>
        </div>
      </header>

      <section class="status" id="status">正在读取当前页面...</section>

      <section class="field">
        <div class="field-title">
          <label for="title">标题</label>
          <button id="copyTitle" type="button">复制</button>
        </div>
        <textarea id="title" rows="3" placeholder="未识别到标题时可在这里手动填写"></textarea>
      </section>

      <section class="field">
        <div class="field-title">
          <label for="abstract">摘要</label>
          <button id="copyAbstract" type="button">复制</button>
        </div>
        <textarea id="abstract" rows="8" placeholder="未识别到摘要时可在这里手动填写"></textarea>
      </section>

      <section class="tool-panel" aria-label="功能区">
        <div class="tool-panel-title">
          <strong>功能区</strong>
          <span id="apiState">未配置 API</span>
        </div>
        <div class="actions">
          <button id="copyAll" type="button">复制全部</button>
          <button id="showPanel" type="button">悬浮模式</button>
          <button id="analyzePaper" class="primary" type="button">分析论文</button>
        </div>
        <button id="openResult" class="wide-button" type="button" disabled>查看分析结果</button>
      </section>
    </main>

    <dialog id="apiDialog" class="modal">
      <form method="dialog" class="modal-inner">
        <div class="modal-head">
          <h2>系统设置</h2>
          <button class="icon-button small" value="cancel" type="submit" aria-label="关闭">×</button>
        </div>

        <section class="settings-section">
          <h3>API</h3>
          <label class="stacked-label" for="apiEndpoint">API 地址</label>
          <input id="apiEndpoint" type="url" placeholder="https://api.deepseek.com/chat/completions">

          <label class="stacked-label" for="apiModel">模型</label>
          <input id="apiModel" type="text" placeholder="deepseek-v4-flash">

          <label class="stacked-label" for="apiKey">API Key</label>
          <input id="apiKey" type="password" autocomplete="off" placeholder="sk-...">

          <label class="stacked-label" for="temperature">Temperature</label>
          <input id="temperature" type="number" min="0" max="2" step="0.1">
        </section>

        <section class="settings-section">
          <div class="section-head">
            <h3>提示词</h3>
            <button id="resetPrompt" type="button">恢复默认</button>
          </div>
          <textarea id="analysisPrompt" rows="12"></textarea>
        </section>

        <section class="settings-section">
          <div class="section-head">
            <h3>知识库</h3>
            <label class="switch">
              <input id="knowledgeEnabled" type="checkbox">
              <span>启用</span>
            </label>
          </div>
          <label class="stacked-label" for="knowledgePath">知识库地址</label>
          <div class="input-row">
            <input id="knowledgePath" type="text" readonly placeholder="尚未导入 Markdown 目录">
            <button id="importKnowledgeBase" type="button">选择目录</button>
          </div>
          <input id="knowledgeFileInput" class="hidden-file" type="file" accept=".md,.markdown,text/markdown,text/plain" multiple webkitdirectory>
          <p id="knowledgeSummary" class="settings-note">默认关闭。启用后会把已导入的 Markdown 文件作为分析知识库。</p>
          <button id="clearKnowledgeBase" type="button">清空知识库</button>
        </section>

        <div class="modal-actions">
          <button id="saveApiSettings" class="primary" value="default" type="button">保存设置</button>
          <button value="cancel" type="submit">取消</button>
        </div>
      </form>
    </dialog>

    <dialog id="resultDialog" class="modal result-modal">
      <form method="dialog" class="modal-inner">
        <div class="modal-head">
          <h2>分析结果</h2>
          <button class="icon-button small" value="cancel" type="submit" aria-label="关闭">×</button>
        </div>

        <article id="analysisMarkdown" class="markdown-view empty">还没有分析结果。</article>

        <div class="modal-actions">
          <button id="copyAnalysis" class="primary" type="button">复制 Markdown</button>
          <button value="cancel" type="submit">关闭</button>
        </div>
      </form>
    </dialog>

    <script src="popup.js"></script>
  </body>
</html>
